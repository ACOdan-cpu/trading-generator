<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #efefeb;
    --border: #e0ddd6;
    --border2: #d0cdc4;
    --accent: #1a1a1a;
    --accent-soft: #2d2d2d;
    --text: #1a1a1a;
    --text-muted: #888880;
    --text-faint: #b8b5ae;
    --slot-h: 120px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* HEADER */
  header {
    width: 100%;
    max-width: 680px;
    padding: 3rem 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .5rem;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--text-faint);
    font-weight: 400;
    margin-bottom: .25rem;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 12vw, 96px);
    letter-spacing: .03em;
    line-height: .95;
    text-align: center;
    color: var(--text);
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    font-weight: 300;
    font-style: italic;
    margin-top: .5rem;
  }

  /* MAIN */
  main {
    width: 100%;
    max-width: 680px;
    padding: 1.5rem 2rem 4rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* SLOT CARD */
  .slot-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .slot-window {
    height: var(--slot-h);
    display: flex;
    align-items: center;
    padding: 0 2rem;
    overflow: hidden;
    position: relative;
  }

  .slot-window::before,
  .slot-window::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 28px;
    z-index: 2;
    pointer-events: none;
  }
  .slot-window::before { top: 0; background: linear-gradient(to bottom, var(--surface), transparent); }
  .slot-window::after  { bottom: 0; background: linear-gradient(to top, var(--surface), transparent); }

  .reel-topic {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 6vw, 52px);
    letter-spacing: .03em;
    color: var(--text-faint);
    line-height: 1.1;
    transition: color .25s;
    user-select: none;
  }

  .reel-topic.landed { color: var(--text); }

  /* SPIN BUTTON */
  .spin-btn {
    width: 100%;
    padding: 1.1rem 2rem;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: .1em;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .spin-btn:hover { background: var(--accent-soft); }
  .spin-btn:active { transform: scale(.99); }

  .spin-btn.spinning {
    background: var(--surface2);
    color: var(--text-muted);
    cursor: not-allowed;
  }

  .spin-icon { display: inline-block; font-size: 18px; line-height: 1; }
  .spin-btn.spinning .spin-icon { animation: spinIcon .5s linear infinite; }
  @keyframes spinIcon { to { transform: rotate(360deg); } }

  /* TIMER */
  .timer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.75rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
    display: none;
  }

  .timer-card.visible { display: flex; }

  .timer-ring-wrap {
    position: relative;
    width: 140px;
    height: 140px;
  }

  .timer-svg {
    width: 140px;
    height: 140px;
    transform: rotate(-90deg);
  }

  .timer-track {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 6;
  }

  .timer-progress {
    fill: none;
    stroke: var(--text);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 376;
    stroke-dashoffset: 0;
    transition: stroke 0.5s;
  }

  .timer-progress.warning { stroke: #c8923a; }
  .timer-progress.danger  { stroke: #c84a3a; }

  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: .02em;
    color: var(--text);
    transition: color 0.5s;
  }

  .timer-num.warning { color: #c8923a; }
  .timer-num.danger  { color: #c84a3a; }

  .timer-btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .timer-btn {
    flex: 1;
    padding: .75rem 1rem;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: .08em;
    cursor: pointer;
    transition: all .15s;
    border: 1px solid var(--border);
  }

  .timer-btn:active { transform: scale(.98); }

  .timer-start {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .timer-start:hover { background: var(--accent-soft); border-color: var(--accent-soft); }

  .timer-reset {
    background: transparent;
    color: var(--text-muted);
  }

  .timer-reset:hover { background: var(--surface2); color: var(--text); }

  .timer-done {
    font-size: 13px;
    color: var(--text-faint);
    font-style: italic;
    font-weight: 300;
    min-height: 18px;
    transition: opacity .3s;
  }

  /* FOOTER */
  footer {
    padding: 0 2rem 2.5rem;
    font-size: 11px;
    color: var(--text-faint);
    text-align: center;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Impromptu</div>
  <h1>TRADING<br>GENERATOR</h1>
  <p class="subtitle">Spin. Speak for 60 seconds. Build your fluency.</p>
</header>

<main>
  <div class="slot-card">
    <div class="slot-window">
      <div class="reel-topic" id="reel-topic">Press spin</div>
    </div>
  </div>

  <button class="spin-btn" id="spin-btn" onclick="spin()">
    <span class="spin-icon">◎</span>
    <span id="spin-label">SPIN</span>
  </button>

  <!-- TIMER -->
  <div class="timer-card" id="timer-card">
    <div class="timer-ring-wrap">
      <svg class="timer-svg" viewBox="0 0 140 140">
        <circle class="timer-track" cx="70" cy="70" r="60"/>
        <circle class="timer-progress" id="timer-ring" cx="70" cy="70" r="60"/>
      </svg>
      <div class="timer-num" id="timer-num">60</div>
    </div>
    <div class="timer-btn-row">
      <button class="timer-btn timer-start" id="timer-start-btn" onclick="timerToggle()">START</button>
      <button class="timer-btn timer-reset" onclick="timerReset()">RESET</button>
    </div>
    <div class="timer-done" id="timer-done"></div>
  </div>
</main>

<footer>trading generator — dan's content tool</footer>

<script>
const TOPICS = [
  "Stop loss placement",
  "Risk management fundamentals",
  "Managing a losing trade",
  "Drawdown",
  "Win rate vs. risk-reward",
  "Trading psychology",
  "Short-term thinking traps",
  "Why 80% of traders quit",
  "The reality of trading",
  "Who shouldn't trade?",
  "Leverage — how it works",
  "Price action trading",
  "Candlestick patterns",
  "Momentum in trading",
  "Timeframes — which to use",
  "Relative strength",
  "Analyzing vs. trading",
  "What is a trend?",
  "Cycles of a market",
  "Types of markets",
  "News and how it moves markets",
  "Types of positions",
  "Journaling trades",
  "Case studying setups",
  "Demo account — when and how",
  "Transitioning to a live account",
  "Scaling an account",
  "Testing a strategy",
  "Using data in trading",
  "Prop firms — how they work",
  "Choosing a broker",
  "Platforms and tools",
  "Different trader types",
  "How long does it take?",
  "What to avoid in trading",
];

let isSpinning = false;
let lastIndex = -1;

function spin() {
  if (isSpinning) return;
  isSpinning = true;

  const btn = document.getElementById('spin-btn');
  const label = document.getElementById('spin-label');
  const topicEl = document.getElementById('reel-topic');

  btn.classList.add('spinning');
  label.textContent = 'SPINNING...';
  topicEl.classList.remove('landed');

  let pool = TOPICS.filter((_, i) => i !== lastIndex);
  const target = pool[Math.floor(Math.random() * pool.length)];
  lastIndex = TOPICS.indexOf(target);

  let flickers = 0;
  const maxFlickers = 20;
  const interval = setInterval(() => {
    const r = TOPICS[Math.floor(Math.random() * TOPICS.length)];
    topicEl.textContent = r.toUpperCase();
    flickers++;
    if (flickers >= maxFlickers) {
      clearInterval(interval);
      topicEl.textContent = target.toUpperCase();
      topicEl.classList.add('landed');
      btn.classList.remove('spinning');
      label.textContent = 'SPIN AGAIN';
      isSpinning = false;
      // Show timer
      document.getElementById('timer-card').classList.add('visible');
      timerReset();
    }
  }, 55);
}

/* ── TIMER ── */
const TIMER_TOTAL = 60;
const CIRCUMFERENCE = 2 * Math.PI * 60; // 376.99

let timerInterval = null;
let timerRemaining = TIMER_TOTAL;
let timerRunning = false;

function timerRender() {
  const num = document.getElementById('timer-num');
  const ring = document.getElementById('timer-ring');
  const startBtn = document.getElementById('timer-start-btn');
  const done = document.getElementById('timer-done');

  const pct = timerRemaining / TIMER_TOTAL;
  const offset = CIRCUMFERENCE * (1 - pct);

  ring.style.strokeDashoffset = offset;

  num.textContent = timerRemaining;

  // Colour states
  const isWarning = timerRemaining <= 15 && timerRemaining > 5;
  const isDanger  = timerRemaining <= 5;

  ring.classList.toggle('warning', isWarning);
  ring.classList.toggle('danger',  isDanger);
  num.classList.toggle('warning',  isWarning);
  num.classList.toggle('danger',   isDanger);

  startBtn.textContent = timerRunning ? 'PAUSE' : (timerRemaining < TIMER_TOTAL && timerRemaining > 0 ? 'RESUME' : 'START');

  if (timerRemaining === 0) {
    done.textContent = "Time's up!";
    startBtn.textContent = 'DONE';
  } else {
    done.textContent = '';
  }
}

function timerToggle() {
  if (timerRemaining === 0) { timerReset(); return; }
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
  } else {
    timerRunning = true;
    timerInterval = setInterval(() => {
      timerRemaining--;
      timerRender();
      if (timerRemaining === 0) {
        clearInterval(timerInterval);
        timerRunning = false;
      }
    }, 1000);
  }
  timerRender();
}

function timerReset() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerRemaining = TIMER_TOTAL;
  timerRender();
}
</script>
</body>
</html>
